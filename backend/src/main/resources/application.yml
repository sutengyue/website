
server:
  port: 8040

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/example_db2?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: personal-website-jwt-secret-key-2024
  expiration: 86400000

file:
  storage: local
  local:
    path: ./uploads
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: website

logging:
  level:
    com.example.website: DEBUG
    org.springframework.security: INFO
